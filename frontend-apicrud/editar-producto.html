<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>Admin - Editar Producto</title>

    <!-- Custom fonts for this template-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" type="text/css">
    <link
        href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
        rel="stylesheet">

    <!-- Custom styles for this template-->
    <link href="css/sb-admin-2.min.css" rel="stylesheet">

    <style>
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body id="page-top">

    <!-- Page Wrapper -->
    <div id="wrapper">

        <!-- Sidebar (igual que en crear-pro.html) -->
        <ul class="navbar-nav bg-gradient-primary sidebar sidebar-dark accordion" id="accordionSidebar">
            <!-- ... tu sidebar existente ... -->
            <!-- (Mantén el mismo sidebar que tienes en crear-pro.html) -->
            <a class="sidebar-brand d-flex align-items-center justify-content-center" href="index.html">
                <div class="sidebar-brand-icon rotate-n-15">
                    <i class="fas fa-laugh-wink"></i>
                </div>
                <div class="sidebar-brand-text mx-3">Inventario</div>
            </a>
            <!-- ... resto del sidebar ... -->
        </ul>
        <!-- End of Sidebar -->

        <!-- Content Wrapper -->
        <div id="content-wrapper" class="d-flex flex-column">

            <!-- Main Content -->
            <div id="content">

                <!-- Topbar (igual que en crear-pro.html) -->
                <nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
                    <!-- ... tu topbar existente ... -->
                </nav>
                <!-- End of Topbar -->

                <!-- Begin Page Content -->
                <div class="container-fluid">

                    <!-- Page Heading -->
                    <div class="d-sm-flex align-items-center justify-content-between mb-4">
                        <h1 class="h3 mb-0 text-gray-800">Editar Producto</h1>
                        <a href="listado-pro.html" class="d-none d-sm-inline-block btn btn-sm btn-primary shadow-sm">
                            <i class="fas fa-list fa-sm text-white-50"></i> Volver al Listado
                        </a>
                    </div>

                    <!-- Content Row -->
                    <div class="row">
                        <div class="col-lg-6">
                            <form id="formulario-producto">
                          
                                <!-- Nombre input -->
                                <div class="form-group">
                                    <label for="nombre-pro">Nombre del Producto *</label>
                                    <input type="text" id="nombre-pro" class="form-control" required />
                                </div>

                                <!-- Precio input -->
                                <div class="form-group">
                                    <label for="precio-pro">Precio *</label>
                                    <input type="number" id="precio-pro" class="form-control" step="0.01" min="0" required />
                                </div>
    
                                <!-- Stock input -->
                                <div class="form-group">
                                    <label for="stock-pro">Stock *</label>
                                    <input type="number" id="stock-pro" class="form-control" min="0" required />
                                </div>
                              
                                <!-- Descripción textarea -->
                                <div class="form-group">
                                    <label for="descripcion-pro">Descripción</label>
                                    <textarea class="form-control" id="descripcion-pro" rows="4"></textarea>
                                </div>

                                <!-- URL de Imagen input -->
                                <div class="form-group">
                                    <label for="imagen-pro-url">URL de la Imagen</label>
                                    <input type="url" id="imagen-pro-url" class="form-control" placeholder="https://ejemplo.com/imagen.jpg" />
                                    <small class="form-text text-muted">Ingresa la URL completa de la imagen</small>
                                </div>
                            
                                <!-- Submit button -->
                                <button type="submit" class="btn btn-primary btn-block mb-4">Actualizar Producto</button>
                            </form>
                        </div>
                        <div class="col-lg-5 offset-lg-1">
                            <div class="text-center">
                                <h5>Vista Previa</h5>
                                <img id="imagen-preview" src="https://via.placeholder.com/300x200?text=Vista+Previa" 
                                     class="preview-image" alt="Vista previa del producto">
                            </div>
                        </div>
                    </div>

                </div>
                <!-- /.container-fluid -->

            </div>
            <!-- End of Main Content -->

            <!-- Footer -->
            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Copyright &copy; Tienda de Comidas 2026</span>
                    </div>
                </div>
            </footer>
            <!-- End of Footer -->

        </div>
        <!-- End of Content Wrapper -->

    </div>
    <!-- End of Page Wrapper -->

    <!-- Scroll to Top Button-->
    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>

    <!-- Bootstrap core JavaScript-->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>

    <!-- Core plugin JavaScript-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-easing/1.4.1/jquery.easing.min.js"></script>

    <!-- Custom scripts for all pages-->
    <script src="js/sb-admin-2.min.js"></script>

    <script>
        // --- CONFIGURACIÓN ---
        const API_BASE_URL = 'http://localhost:3000/api';

        // --- FUNCIÓN AUXILIAR ---
        async function handleFetchResponse(response) {
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({ message: 'Error del servidor' }));
                throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
            }
            return response.json();
        }

        document.addEventListener('DOMContentLoaded', async function() {
            const formulario = document.getElementById('formulario-producto');
            const urlParams = new URLSearchParams(window.location.search);
            const productoId = urlParams.get('id');

            // Referencias a los inputs
            const nombreInput = document.getElementById('nombre-pro');
            const precioInput = document.getElementById('precio-pro');
            const stockInput = document.getElementById('stock-pro');
            const descripcionInput = document.getElementById('descripcion-pro');
            const imagenUrlInput = document.getElementById('imagen-pro-url');
            const imagenPreview = document.getElementById('imagen-preview');

            // Actualizar vista previa cuando cambia la URL
            imagenUrlInput.addEventListener('input', function() {
                if (this.value) {
                    imagenPreview.src = this.value;
                } else {
                    imagenPreview.src = 'https://via.placeholder.com/300x200?text=Vista+Previa';
                }
            });

            if (!productoId) {
                alert('No se especificó un ID de producto');
                window.location.href = 'listado-pro.html';
                return;
            }

            // --- 1. CARGAR DATOS DEL PRODUCTO ---
            try {
                const response = await fetch(`${API_BASE_URL}/productos/${productoId}`);
                const producto = await handleFetchResponse(response);

                // 2. RELLENAR EL FORMULARIO CON LOS DATOS
                nombreInput.value = producto.nombre || '';
                precioInput.value = producto.precio || '';
                stockInput.value = producto.stock || '';
                descripcionInput.value = producto.descripcion || '';
                imagenUrlInput.value = producto.imagen || '';
                
                // Actualizar vista previa
                if (producto.imagen) {
                    imagenPreview.src = producto.imagen;
                }

            } catch (error) {
                console.error('Error al cargar producto:', error);
                alert('❌ Error al cargar los datos del producto: ' + error.message);
                // Opcional: redirigir después de un tiempo
                setTimeout(() => {
                    window.location.href = 'listado-pro.html';
                }, 3000);
                return;
            }

            // --- 3. ENVÍO DEL FORMULARIO (EDITAR) ---
            formulario.addEventListener('submit', async function(event) {
                event.preventDefault();

                // Validación básica
                if (!nombreInput.value || !precioInput.value || !stockInput.value) {
                    alert('Por favor, completa todos los campos obligatorios');
                    return;
                }

                const productoActualizado = {
                    nombre: nombreInput.value,
                    precio: parseFloat(precioInput.value),
                    stock: parseInt(stockInput.value),
                    descripcion: descripcionInput.value,
                    imagen: imagenUrlInput.value
                };

                try {
                    const response = await fetch(`${API_BASE_URL}/productos/${productoId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(productoActualizado)
                    });
                    
                    const resultado = await handleFetchResponse(response);
                    alert('✅ Producto actualizado con éxito');
                    window.location.href = 'listado-pro.html';

                } catch (error) {
                    alert('❌ Error al actualizar: ' + error.message);
                }
            });
        });
    </script>

</body>

</html>
